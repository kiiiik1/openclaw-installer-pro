name: Build Linux Executable

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 requests python-dotenv

    - name: Install PyQt5 dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0

    - name: Build Linux executable
      run: |
        pyinstaller --onefile --name "openclaw-installer" src/main.py

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/openclaw-installer
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v3
      with:
        name: linux-executable
        path: dist/openclaw-installer
